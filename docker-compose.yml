services:
  postgres:
    image: postgres:16-alpine
    container_name: memorial_visit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memorial_visit
    ports:
      - "5432:5432"
    volumes:
      - memorial_visit_pgdata:/var/lib/postgresql/data

volumes:
  memorial_visit_pgdata:
